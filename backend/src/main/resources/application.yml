spring:
  application:
    name: RDFArchitect
  config:
    import:
      - application-database.yml
      - application-frontend.yml
      - application-graph.yml
      - application-rendering.yml
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  tomcat:
    max-http-form-post-size: 50MB
    max-swallow-size: 50MB
    max-part-count: 100
  servlet:
    session:
      tracking-modes: cookie
      cookie:
        name: RDFA_SESSION_ID
        same-site: lax      #für production: lax, strict oder none?
        secure: false       #für production: setz das auf true
        http-only: false    #für production: setz das auf true
        path: /
        max-age: 365d
      timeout: 365d

attributes:
  # When true, new attribute fixed/default values are persisted as RDF blank-node wrappers
  # instead of direct literals. Existing values keep their shape regardless of this flag.
  newValuesBlankNode: false
