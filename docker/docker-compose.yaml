services:
    backend:
        build:
            context: ./backend
        environment:
            DATABASE_DATABASETYPE: http
            DATABASE_DEFAULTDATASET: default
            DATABASE_HTTP_ENDPOINT: http://host.docker.internal:3030
        expose:
            - "8080"

    frontend:
        build:
            context: ./frontend
        environment:
            PUBLIC_BACKEND_URL: "/api"
        expose:
            - "80"

    gateway:
        image: nginx:alpine3.22
        depends_on:
            - frontend
            - backend
        ports:
            - "3000:80"
        volumes:
            - ./nginx.local.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
    fuseki-data: